            <div class="container main-header">
                <h2>Georgi Spirov</h2>

                <button id="nav-toggle"

            </div>
        </header>

        <main class="container">
            <section>
                <h1 class="center">Contact</h1>

                <form id="contact-form" method="post">
                    <div class="form-field">
                        <label for="firstName">First Name *</label>
                        <input type="text" id="firstName" name="firstName" required>
                    </div>

                    <div class="form-field">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-field">
                        <label for="confirmEmail">Confirm Email *</label>
                        <input type="email" id="confirmEmail" name="confirmEmail" required>
                    </div>

                    <div class="form-field">
                        <label for="phone">Phone *</label>
                        <input type="tel" id="phone" name="phone" placeholder="+44" inputmode="tel" required>
                    </div>

                    <div class="form-field">
                        <label for="preferredContactMethod">Preferred Contact Method *</label>
                        <select id="preferredContactMethod" name="preferredContactMethod">
                            <option value="">Select Method</option>
                            <option value="email">Email</option>
                            <option value="phone">Phone</option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="projectDate">Project Date *</label>
                        <input type="date" id="projectDate" name="projectDate" required>
                    </div>

                    <div class="form-field">
                        <label for="duration">Duration (days) *</label>
                        <input type="number" id="duration" name="duration" min="1" step="1" required>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn btn-submit">Send</button>
                    </div>
                </form>
            </section>
        </main>

        <script defer src="./js/app.js"></script>
        <script defer src="./js/contact.js"></script>

        <footer>
